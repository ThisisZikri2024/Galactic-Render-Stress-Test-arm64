<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Omniverse v3.3 | ARM64 UNLOCKED</title>
    <style>
        /* =========================================
           1. ARM64 OPTIMIZED ARCHITECTURE
           =========================================
        */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap');

        :root {
            --neon-blue: #00d2ff;
            --neon-pink: #ff007a;
            --terminal-green: #00ff41;
            --space-black: #020205;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }

        body, html {
            width: 100%; height: 100%;
            background: var(--space-black);
            color: #ffffff;
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
            touch-action: none;
        }

        /* GPU Layer: Memaksa pelayar menggunakan GPU ARM64 */
        #render-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            image-rendering: -webkit-optimize-contrast;
            transform: translateZ(0); 
        }

        /* UI: HUD System (Z-Index 100) */
        .hud-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100;
        }

        .hud-panel {
            position: absolute; pointer-events: auto;
            background: rgba(10, 15, 30, 0.85);
            border: 1px solid rgba(0, 210, 255, 0.2);
            padding: 15px; backdrop-filter: blur(12px);
        }

        #top-left { top: 20px; left: 20px; border-left: 4px solid var(--neon-blue); }
        #top-right { top: 20px; right: 20px; text-align: right; border-right: 4px solid var(--neon-pink); }
        #log-panel { bottom: 90px; left: 20px; width: 280px; height: 120px; font-size: 0.7rem; }

        .glitch-text {
            font-family: 'Orbitron'; font-size: 1.5rem; color: var(--neon-blue);
            text-shadow: 2px 2px var(--neon-pink);
        }

        .label { font-size: 0.6rem; color: #888; text-transform: uppercase; }

        /* Sidebar & Buttons */
        #sidebar {
            position: fixed; top: 0; right: -350px; width: 320px; height: 100%;
            background: rgba(5, 5, 10, 0.98); border-left: 2px solid var(--neon-blue);
            z-index: 1000; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 50px 30px;
        }
        #sidebar.open { right: 0; }

        .action-btn {
            width: 100%; padding: 12px; margin-bottom: 10px;
            background: rgba(255,255,255,0.05); border: 1px solid #333;
            color: #fff; font-family: 'Orbitron'; cursor: pointer;
        }
        .action-btn.active { background: var(--neon-blue); color: #000; font-weight: bold; }

        #toggle-menu {
            position: fixed; bottom: 25px; right: 25px; z-index: 1001;
            background: var(--neon-blue); color: #000; padding: 15px 25px;
            font-family: 'Orbitron'; border: none; font-weight: bold;
        }

        #terminal { color: var(--terminal-green); height: 80px; overflow: hidden; }

    </style>
</head>
<body>

    <canvas id="render-canvas"></canvas>

    <div class="hud-overlay">
        <div class="hud-panel" id="top-left">
            <div id="clock" class="glitch-text">00:00:00</div>
            <div id="date-hijri" style="font-size: 0.8rem; color: var(--neon-blue);">LOADING...</div>
        </div>

        <div class="hud-panel" id="top-right">
            <div class="label">ARM64 CORE STATUS</div>
            <div id="fps-meter" class="glitch-text" style="color: var(--neon-pink);">0 FPS</div>
            <div id="entity-count" class="label">ENTITIES: 0</div>
        </div>

        <div class="hud-panel" id="log-panel">
            <div class="label" style="color: var(--terminal-green); margin-bottom: 5px;">> KERNEL_LOG</div>
            <div id="terminal"></div>
        </div>
    </div>

    <button id="toggle-menu" onclick="ui.toggle()">MENU</button>

    <div id="sidebar">
        <h2 style="font-family: 'Orbitron'; margin-bottom: 30px; color: var(--neon-blue);">ARM64 CONFIG</h2>
        
        <div style="margin-bottom: 30px;">
            <p class="label">FREQUENCY OVERRIDE</p>
            <button class="action-btn" id="b30" onclick="engine.setFPS(30)">30Hz - Low Power</button>
            <button class="action-btn" id="b60" onclick="engine.setFPS(60)">60Hz - Standard</button>
            <button class="action-btn active" id="b120" onclick="engine.setFPS(120)">120Hz - ProMotion</button>
            <button class="action-btn" id="b240" onclick="engine.setFPS(240)" style="border-color: var(--neon-pink);">240Hz - UNLIMITED</button>
        </div>

        <button class="action-btn" onclick="location.reload()" style="background: var(--neon-pink); border:none;">PURGE & REBOOT</button>
        
        <div style="margin-top: 50px; font-size: 0.6rem; color: #444;">
            OMNIVERSE ARM64 v3.3.0<br>BINARY: EXECUTABLE_JS
        </div>
    </div>

    <script>
        /* =========================================
           2. ARM64 CORE ENGINE (CANVAS BASED)
           =========================================
        */

        const canvas = document.getElementById('render-canvas');
        const ctx = canvas.getContext('2d', { alpha: false }); // High performance hint

        const engine = {
            fps: 120,
            lastTime: performance.now(),
            particles: [],
            planets: [],
            asteroids: [],
            width: 0,
            height: 0,
            
            init() {
                this.resize();
                window.addEventListener('resize', () => this.resize());
                
                // Init Planet Data (Trigonometry based)
                const colors = ['#888', '#e3bb76', '#00d2ff', '#ff4000', '#d39c7e', '#c5ab6e'];
                const dists = [80, 120, 170, 220, 320, 420];
                for(let i=0; i<6; i++) {
                    this.planets.push({
                        dist: dists[i],
                        angle: Math.random() * Math.PI * 2,
                        speed: (0.002 / (i+1)) + 0.0003,
                        size: i === 4 ? 30 : 10 + i,
                        color: colors[i]
                    });
                }

                // Init Asteroid Belt (300+ Entities)
                for(let i=0; i<350; i++) {
                    this.asteroids.push({
                        dist: 240 + Math.random() * 50,
                        angle: Math.random() * Math.PI * 2,
                        speed: 0.0001 + Math.random() * 0.0004,
                        size: Math.random() * 2.5
                    });
                }

                this.bindEvents();
                this.log("Kernel: ARM64 Instruction Set Ready.");
                requestAnimationFrame((t) => this.render(t));
            },

            resize() {
                this.width = canvas.width = window.innerWidth;
                this.height = canvas.height = window.innerHeight;
            },

            render(now) {
                const delta = now - this.lastTime;
                const interval = 1000 / this.fps;

                if (delta > interval) {
                    this.lastTime = now - (delta % interval);
                    
                    // 1. Clear Frame (GPU Optimized)
                    ctx.fillStyle = '#020205';
                    ctx.fillRect(0, 0, this.width, this.height);

                    const cx = this.width / 2;
                    const cy = this.height / 2;

                    // 2. Draw Sun (Radial Gradient)
                    const sunGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 60);
                    sunGrad.addColorStop(0, '#ffffff');
                    sunGrad.addColorStop(0.3, '#ffae00');
                    sunGrad.addColorStop(1, 'transparent');
                    ctx.fillStyle = sunGrad;
                    ctx.beginPath();
                    ctx.arc(cx, cy, 60, 0, Math.PI * 2);
                    ctx.fill();

                    // 3. Draw Planets & Orbits
                    this.planets.forEach(p => {
                        p.angle += p.speed * delta;
                        const x = cx + Math.cos(p.angle) * p.dist;
                        const y = cy + Math.sin(p.angle) * p.dist;

                        // Orbit Line
                        ctx.strokeStyle = 'rgba(0, 210, 255, 0.08)';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.arc(cx, cy, p.dist, 0, Math.PI * 2);
                        ctx.stroke();

                        // Planet
                        ctx.fillStyle = p.color;
                        ctx.shadowBlur = 15; ctx.shadowColor = p.color;
                        ctx.beginPath();
                        ctx.arc(x, y, p.size, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.shadowBlur = 0;
                    });

                    // 4. Draw Asteroid Belt
                    ctx.fillStyle = '#555';
                    this.asteroids.forEach(a => {
                        a.angle += a.speed * delta;
                        const x = cx + Math.cos(a.angle) * a.dist;
                        const y = cy + Math.sin(a.angle) * a.dist;
                        ctx.fillRect(x, y, a.size, a.size);
                    });

                    // 5. Particle Persistence Engine (40s)
                    for(let i = this.particles.length - 1; i >= 0; i--) {
                        const p = this.particles[i];
                        p.life -= delta;
                        if(p.life <= 0) {
                            this.particles.splice(i, 1);
                            continue;
                        }

                        const alpha = p.life / 40000;
                        ctx.fillStyle = `hsla(${p.hue}, 100%, 50%, ${alpha})`;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
                        ctx.fill();
                        p.hue = (p.hue + 2) % 360;
                    }

                    // HUD Update (Throttled)
                    if(this.frameCount % 10 === 0) {
                        document.getElementById('fps-meter').innerText = Math.round(1000/delta) + " FPS";
                        document.getElementById('entity-count').innerText = "ENTITIES: " + (this.particles.length + this.asteroids.length + 7);
                    }
                    this.frameCount++;
                }
                requestAnimationFrame((t) => this.render(t));
            },

            addParticle(x, y) {
                // Limit particles to 3000 for ARM64 stability
                if(this.particles.length > 3000) return;
                this.particles.push({
                    x, y,
                    life: 40000,
                    size: Math.random() * 5 + 2,
                    hue: Math.random() * 360
                });
            },

            bindEvents() {
                const trigger = (e) => {
                    const pts = e.touches ? Array.from(e.touches) : [e];
                    pts.forEach(p => this.addParticle(p.clientX, p.clientY));
                };
                canvas.addEventListener('mousemove', trigger);
                canvas.addEventListener('touchstart', trigger, {passive: true});
                canvas.addEventListener('touchmove', trigger, {passive: true});
                
                setInterval(() => {
                    const now = new Date();
                    document.getElementById('clock').innerText = now.toLocaleTimeString('ms-MY', {hour12:false});
                    const hijri = new Intl.DateTimeFormat('ms-MY-u-ca-islam-uma', {day:'numeric', month:'long', year:'numeric'}).format(now);
                    document.getElementById('date-hijri').innerText = hijri.toUpperCase();
                }, 1000);
            },

            setFPS(v) {
                this.fps = v;
                document.querySelectorAll('.action-btn').forEach(b => b.classList.remove('active'));
                const ids = {30:'b30', 60:'b60', 120:'b120', 240:'b240'};
                document.getElementById(ids[v]).classList.add('active');
                this.log(`System: Clock-rate set to ${v}Hz.`);
            },

            log(m) {
                const t = document.getElementById('terminal');
                const d = document.createElement('div');
                d.innerHTML = `[${new Date().toLocaleTimeString()}] ${m}`;
                t.prepend(d);
                if(t.childNodes.length > 5) t.lastChild.remove();
            }
        };

        const ui = { toggle() { document.getElementById('sidebar').classList.toggle('open'); } };

        window.onload = () => engine.init();

    </script>
</body>
</html>
