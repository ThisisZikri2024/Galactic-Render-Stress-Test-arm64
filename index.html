<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Omniverse v3.3 | ARM64 FIXED</title>
    <style>
        /* CSS dikekalkan untuk estetika tetapi dioptimumkan untuk GPU */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap');
        :root { --neon-blue: #00d2ff; --neon-pink: #ff007a; --terminal-green: #00ff41; --space-black: #020205; }
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; background: var(--space-black); color: #fff; font-family: 'JetBrains Mono', monospace; overflow: hidden; touch-action: none; }
        
        /* Force Hardware Acceleration */
        #render-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; transform: translate3d(0,0,0); backface-visibility: hidden; }
        
        .hud-panel { position: absolute; z-index: 100; background: rgba(10, 15, 30, 0.85); border: 1px solid rgba(0, 210, 255, 0.2); padding: 12px; backdrop-filter: blur(10px); pointer-events: auto; }
        #top-left { top: 20px; left: 20px; border-left: 4px solid var(--neon-blue); }
        #top-right { top: 20px; right: 20px; text-align: right; border-right: 4px solid var(--neon-pink); }
        .glitch { font-family: 'Orbitron'; font-size: 1.4rem; color: var(--neon-blue); text-shadow: 2px 2px var(--neon-pink); }
        .label { font-size: 0.6rem; color: #888; text-transform: uppercase; }
        #terminal { color: var(--terminal-green); font-size: 0.65rem; height: 60px; overflow: hidden; margin-top: 10px; width: 250px; pointer-events: none; }
    </style>
</head>
<body>

    <canvas id="render-layer"></canvas>

    <div class="hud-overlay">
        <div class="hud-panel" id="top-left">
            <div id="clock" class="glitch">00:00:00</div>
            <div id="status" class="label" style="color: var(--neon-blue);">ARM64 STABLE MODE</div>
        </div>

        <div class="hud-panel" id="top-right">
            <div class="label">PRECISION FPS</div>
            <div id="fps-meter" class="glitch" style="color: var(--neon-pink);">0 FPS</div>
            <div id="terminal"></div>
        </div>
    </div>

    <script>
        /* ARM64 PRECISION ENGINE 
           Fix: Frame-independent movement & High-res Delta Timing
        */

        const canvas = document.getElementById('render-layer');
        const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });

        const engine = {
            targetFPS: 120,
            lastTime: performance.now(),
            accumulatedTime: 0,
            frameTime: 1000 / 120,
            particles: [],
            planets: [],
            
            init() {
                this.resize();
                window.addEventListener('resize', () => this.resize());
                
                // Init celestial bodies
                const colors = ['#888', '#e3bb76', '#00d2ff', '#ff4000', '#d39c7e', '#c5ab6e'];
                for(let i=0; i<6; i++) {
                    this.planets.push({
                        dist: 80 + (i * 55),
                        angle: Math.random() * Math.PI * 2,
                        speed: (0.001 / (i + 1)),
                        size: 8 + i,
                        color: colors[i]
                    });
                }

                this.bindEvents();
                this.log("ARM64 Sync: OK");
                this.log("Delta-Time Fix: ACTIVE");
                requestAnimationFrame((t) => this.mainLoop(t));
            },

            resize() {
                const dpr = window.devicePixelRatio || 1;
                canvas.width = window.innerWidth * dpr;
                canvas.height = window.innerHeight * dpr;
                ctx.scale(dpr, dpr);
                this.width = window.innerWidth;
                this.height = window.innerHeight;
            },

            // FIX UTAMA: Pengiraan FPS yang stabil
            mainLoop(currentTime) {
                const deltaTime = currentTime - this.lastTime;
                this.lastTime = currentTime;
                
                // Elak 'spiral of death' jika tab tidak aktif
                const dt = Math.min(deltaTime, 100); 

                this.update(dt);
                this.draw();

                // FPS Meter Accuracy
                if (Math.random() > 0.9) {
                    const currentFPS = Math.round(1000 / dt);
                    document.getElementById('fps-meter').innerText = currentFPS + " FPS";
                }

                requestAnimationFrame((t) => this.mainLoop(t));
            },

            update(dt) {
                // Pergerakan planet berdasarkan masa (bukan bingkai)
                this.planets.forEach(p => {
                    p.angle += p.speed * dt;
                });

                // Update particles
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    this.particles[i].life -= dt;
                    if (this.particles[i].life <= 0) this.particles.splice(i, 1);
                }
            },

            draw() {
                ctx.fillStyle = '#020205';
                ctx.fillRect(0, 0, this.width, this.height);

                const cx = this.width / 2;
                const cy = this.height / 2;

                // Sun
                ctx.fillStyle = '#ffae00';
                ctx.shadowBlur = 40; ctx.shadowColor = '#ff6600';
                ctx.beginPath(); ctx.arc(cx, cy, 40, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;

                // Planets
                this.planets.forEach(p => {
                    const x = cx + Math.cos(p.angle) * p.dist;
                    const y = cy + Math.sin(p.angle) * p.dist;
                    
                    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
                    ctx.beginPath(); ctx.arc(cx, cy, p.dist, 0, Math.PI*2); ctx.stroke();

                    ctx.fillStyle = p.color;
                    ctx.beginPath(); ctx.arc(x, y, p.size, 0, Math.PI*2); ctx.fill();
                });

                // Particles
                this.particles.forEach(p => {
                    const alpha = p.life / 40000;
                    ctx.fillStyle = `hsla(${p.hue}, 100%, 50%, ${alpha})`;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
                    p.hue = (p.hue + 1) % 360;
                });
            },

            bindEvents() {
                const addP = (e) => {
                    const pts = e.touches ? Array.from(e.touches) : [e];
                    pts.forEach(pt => {
                        if(this.particles.length < 2000) {
                            this.particles.push({
                                x: pt.clientX, y: pt.clientY,
                                life: 40000, size: 2 + Math.random()*3,
                                hue: Math.random()*360
                            });
                        }
                    });
                };
                window.addEventListener('mousemove', addP);
                window.addEventListener('touchstart', addP, {passive: true});
                window.addEventListener('touchmove', addP, {passive: true});
                
                setInterval(() => {
                    document.getElementById('clock').innerText = new Date().toLocaleTimeString('ms-MY', {hour12:false});
                }, 1000);
            },

            log(m) {
                const t = document.getElementById('terminal');
                t.innerHTML = `> ${m}<br>` + t.innerHTML;
            }
        };

        window.onload = () => engine.init();
    </script>
</body>
</html>
